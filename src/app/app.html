@if (status() === GameStatus.Idle) {
  <app-start-screen />
} @else {
  <main class="game">
    <header class="topbar">
      <h1 class="brand">2048</h1>
      <div class="score-box">
        <span>SKOR</span>
        <strong>{{ score() }}</strong>
      </div>
    </header>

    <div class="board">
      @for (row of grid(); track $index) {
        @for (cell of row; let ci = $index; track ci) {
          <div class="cell">
            @if (cell) {
              <div class="tile tile-{{ cell.value }}">{{ cell.value }}</div>
            }
          </div>
        }
      }
    </div>

    <button class="btn-primary restart-btn" type="button" (click)="onRestart()">
      Yeni Oyun
    </button>
  </main>
}

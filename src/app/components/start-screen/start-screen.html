<section class="start-screen">
  <div class="hero">
    <div class="logo">2048</div>
    <h1 class="title">2048</h1>
    <p class="subtitle" [innerHTML]="t('start.subtitle')"></p>

    <div class="preview">
      <span class="mini-tile t2">2</span>
      <span class="mini-tile t4">4</span>
      <span class="mini-tile t8">8</span>
      <span class="mini-tile t16">16</span>
    </div>

    <div class="start-buttons">
      <button class="btn-primary start-btn" type="button" (click)="onStart()">
        {{ t('start.play') }}
      </button>
      <button
        class="btn-primary ghost start-btn"
        type="button"
        (click)="onStartLevel()"
      >
        {{ t('start.levelMode') }}
      </button>
    </div>

    <p class="gold-total">{{ t('start.totalGold') }} {{ gold() }}</p>

    @if (bestLevel() > 0) {
      <p class="best-level">{{ t('start.bestLevel') }} {{ bestLevel() }}</p>
    }

    <p class="hint">{{ t('start.hint') }}</p>
  </div>
</section>
